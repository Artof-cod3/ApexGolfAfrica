<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ApexGolf Africa</title>
  <desc id="desc">ApexGolf Africa brand mark in gold on deep green background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1F17"/>
      <stop offset="100%" stop-color="#0B3A2C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E5D5A8"/>
      <stop offset="100%" stop-color="#B8984D"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="500" width="1200" height="2" fill="#1C3A2A"/>

  <g transform="translate(80,90)">
    <path d="M90 20 L220 20 L290 115 L290 290 L155 390 L20 290 L20 115 Z" fill="none" stroke="url(#gold)" stroke-width="14"/>
    <circle cx="155" cy="230" r="42" fill="none" stroke="#B8984D" stroke-width="6"/>
    <circle cx="155" cy="230" r="6" fill="#E5D5A8"/>
    <path d="M135 165 L190 190 L135 215 Z" fill="#D6B86B"/>
  </g>

  <g fill="url(#gold)">
    <text x="390" y="245" font-size="124" font-family="Georgia, 'Times New Roman', serif" font-weight="700" letter-spacing="6">APEXGOLF</text>
    <text x="390" y="332" font-size="72" font-family="Georgia, 'Times New Roman', serif" letter-spacing="14">AFRICA</text>
  </g>

  <text x="600" y="566" text-anchor="middle" fill="#A9B3AA" font-size="48" font-style="italic" font-family="Georgia, 'Times New Roman', serif" letter-spacing="3">Reach the Apex of Golf Service</text>
</svg>
